apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litellm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "litellm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "litellm.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: prepare-writable-dirs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              # Copy prisma cache for database client
              cp -r /root/.cache /mnt/root-home/

              # Copy litellm_proxy_extras migrations (post-migration sanity check writes here)
              MIGRATIONS_SRC=$(python3 -c "import litellm_proxy_extras, os; print(os.path.join(os.path.dirname(litellm_proxy_extras.__file__), 'migrations'))")
              if [ -d "$MIGRATIONS_SRC" ]; then
                cp -a "$MIGRATIONS_SRC"/. /mnt/proxy-extras-migrations/
              fi

              # Copy UI assets (UI restructure writes here)
              UI_SRC=$(python3 -c "import litellm.proxy._experimental as exp, os; print(os.path.join(os.path.dirname(exp.__file__), 'out'))")
              if [ -d "$UI_SRC" ]; then
                cp -a "$UI_SRC"/. /mnt/ui-out/
              fi

              # Set ownership for non-root main container
              chown -R 1000:1000 /mnt/root-home/ /mnt/proxy-extras-migrations/ /mnt/ui-out/ /mnt/litellm-data/
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: root-home
              mountPath: /mnt/root-home
            - name: proxy-extras-migrations
              mountPath: /mnt/proxy-extras-migrations
            - name: ui-out
              mountPath: /mnt/ui-out
            - name: litellm-data
              mountPath: /mnt/litellm-data
      containers:
        - name: litellm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: LITELLM_SALT_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: DATABASE_URL
            - name: LITELLM_NON_ROOT
              value: "true"
            - name: HOME
              value: /root
            - name: AWS_STS_REGIONAL_ENDPOINTS
              value: regional
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_REGION
              value: us-east-1
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: root-home
              mountPath: /root
            - name: tmp
              mountPath: /tmp
            - name: litellm-data
              mountPath: /var/lib/litellm
            - name: proxy-extras-migrations
              mountPath: /usr/lib/python3.13/site-packages/litellm_proxy_extras/migrations
            - name: ui-out
              mountPath: /usr/lib/python3.13/site-packages/litellm/proxy/_experimental/out
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: root-home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: litellm-data
          emptyDir: {}
        - name: proxy-extras-migrations
          emptyDir: {}
        - name: ui-out
          emptyDir: {}