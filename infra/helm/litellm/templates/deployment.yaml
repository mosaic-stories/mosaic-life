apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litellm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "litellm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "litellm.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: copy-prisma-binaries
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Copying Prisma cache from image to writable volume..."
              cp -r /root/.cache/* /app/cache/ 2>/dev/null || true
              echo "Contents of /app/cache:"
              ls -la /app/cache/
              echo "Prisma binaries:"
              find /app/cache -name 'query-engine*' -type f 2>/dev/null | head -5
              echo "Done."
          volumeMounts:
            - name: cache
              mountPath: /app/cache
      containers:
        - name: litellm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: LITELLM_SALT_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: DATABASE_URL
            - name: LITELLM_NON_ROOT
              value: "true"
            - name: HOME
              value: /app/cache
            - name: PRISMA_HOME_DIR
              value: /app/cache
            - name: XDG_CACHE_HOME
              value: /app/cache
            - name: PRISMA_BINARY_CACHE_DIR
              value: /app/cache/prisma-python/binaries
            - name: PRISMA_NODEENV_CACHE_DIR
              value: /app/cache/nodeenv
            - name: NPM_CONFIG_CACHE
              value: /app/cache/npm
            - name: LITELLM_MIGRATION_DIR
              value: /app/migrations
            - name: DISABLE_SCHEMA_UPDATE
              value: "true"
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: cache
              mountPath: /app/cache
            - name: migrations
              mountPath: /app/migrations
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: cache
          emptyDir: {}
        - name: migrations
          emptyDir: {}
        - name: tmp
          emptyDir: {}