{{- if .Values.entityBackfill.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: entity-backfill-{{ .Release.Revision }}
  labels:
    app.kubernetes.io/name: entity-backfill
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: {{ .Values.coreApi.name }}
      containers:
        - name: backfill
          image: "{{ .Values.global.registry }}/{{ .Values.coreApi.image.repository }}:{{ .Values.global.imageTag }}"
          command: ["python", "scripts/backfill_entities.py"]
          env:
          {{- range .Values.coreApi.env }}
          - name: {{ .name }}
            {{- if .value }}
            value: {{ .value | quote }}
            {{- end }}
            {{- if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- if .Values.externalSecrets.litellm.secretKey }}
          - name: LITELLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-api-key
                key: LITELLM_API_KEY
          {{- end }}
          - name: GRAPH_AUGMENTATION_ENABLED
            value: "true"
      restartPolicy: Never
{{- end }}
