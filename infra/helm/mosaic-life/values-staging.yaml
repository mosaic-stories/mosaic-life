# Staging Environment Values
# These values are merged with the base values.yaml for staging deployments

global:
  environment: "staging"
  domain: "stage.mosaiclife.me"

# Frontend - staging configuration
web:
  replicaCount: 2
  # Prerender service for SEO (staging namespace)
  prerender:
    host: "prerender-staging.mosaic-staging.svc.cluster.local:3000"
  ingress:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "stage.mosaiclife.me"
      alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600,access_logs.s3.enabled=true,access_logs.s3.bucket=mosaic-life-observability,access_logs.s3.prefix=alb/access/shared
    hosts:
      - host: stage.mosaiclife.me
        paths:
          - path: /
            pathType: Prefix

# Core API - staging configuration
coreApi:
  replicaCount: 2
  ingress:
    annotations:
      alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600,access_logs.s3.enabled=true,access_logs.s3.bucket=mosaic-life-observability,access_logs.s3.prefix=alb/access/shared
  extraEnv:
    - name: SESSION_COOKIE_NAME
      value: "mosaic_session_stage"
    - name: SESSION_COOKIE_DOMAIN
      value: ".stage.mosaiclife.me"

# External Secrets - staging overrides
externalSecrets:
  neptune:
    secretKey: "mosaic/staging/neptune/connection"
