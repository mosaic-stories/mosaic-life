apiVersion: v1
kind: Service
metadata:
  name: {{ include "graph-explorer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graph-explorer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "graph-explorer.selectorLabels" . | nindent 4 }}
