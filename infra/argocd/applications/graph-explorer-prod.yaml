apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graph-explorer-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mosaic-life

  sources:
    - repoURL: https://github.com/mosaic-stories/mosaic-life
      targetRevision: main
      path: infra/helm/graph-explorer
      helm:
        valueFiles:
          - $values/environments/prod/graph-explorer-values.yaml
    - repoURL: https://github.com/mosaic-stories/gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10